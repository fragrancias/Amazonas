<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazonas: O Eco do Artefato</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020a02;
            font-family: sans-serif;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px black;
            pointer-events: none;
        }

        .hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #4ade80;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #166534;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <div id="ui">
        <h1>Amazonas: O Eco do Artefato</h1>
        <p>Lucas "Lobo" em exploração técnica</p>
    </div>
    <div class="hint">Use <b>WASD</b> ou <b>Setas</b> (Controles Invertidos)</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="./src/game.js"></script>
</body>

</html>
